services:
  - type: web
    name: emblem-api
    runtime: node
    rootDir: server
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: none
      - key: TRUST_PROXY
        value: "true"
      - key: UPLOAD_DIR
        value: uploads
      - key: UPLOAD_MAX_MB
        value: "10"
    disk:
      name: emblem-uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
